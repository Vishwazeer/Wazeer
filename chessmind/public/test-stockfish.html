<!DOCTYPE html>
<html>
<head>
  <title>Stockfish WASM Test</title>
  <style>
    body {
      background-color: #121214;
      color: #e4e4e7;
      font-family: sans-serif;
      padding: 20px;
    }
    pre {
      background-color: #18181b;
      padding: 15px;
      border-radius: 6px;
      border: 1px solid #27272a;
      overflow-x: auto;
    }
    .success { color: #4ade80; }
    .error { color: #f87171; }
    .info { color: #60a5fa; }
  </style>
</head>
<body>
  <h1>Stockfish WASM Diagnostics</h1>
  <div id="status" class="info">Initializing test...</div>
  
  <h2>Worker Output Logs</h2>
  <pre id="logs"></pre>

  <h2>Worker Errors</h2>
  <pre id="errors" class="error"></pre>

  <script>
    const logsEl = document.getElementById('logs');
    const errorsEl = document.getElementById('errors');
    const statusEl = document.getElementById('status');

    function log(msg, type = 'info') {
      const span = document.createElement('span');
      span.className = type;
      span.textContent = msg + '\n';
      logsEl.appendChild(span);
    }

    function logError(msg) {
      errorsEl.textContent += msg + '\n';
    }

    log('1. Starting fetch tests...', 'info');
    fetch('/stockfish/stockfish-18-lite-single.js')
      .then(res => {
        log(`- fetched JS: status ${res.status}, type: ${res.headers.get('content-type')}`, 'success');
        return fetch('/stockfish/stockfish-18-lite-single.wasm');
      })
      .then(res => {
        log(`- fetched WASM: status ${res.status}, length: ${res.headers.get('content-length')}`, 'success');
        return res.arrayBuffer();
      })
      .then(buf => {
        log(`- WASM ArrayBuffer byteLength: ${buf.byteLength}`, 'success');
        startWorker();
      })
      .catch(err => {
        log(`Fetch test failed: ${err.message}`, 'error');
        logError(err.stack || err.message);
      });

    function startWorker() {
      log('\n2. Initializing Web Worker directly from /stockfish/stockfish-18-lite-single.js...', 'info');
      try {
        const worker = new Worker('/stockfish/stockfish-18-lite-single.js');
        
        worker.onmessage = function(e) {
          log(`[Worker Msg] ${e.data}`, 'success');
          if (e.data === 'readyok') {
            statusEl.textContent = 'Stockfish initialized successfully!';
            statusEl.className = 'success';
          }
        };

        worker.onerror = function(err) {
          log(`[Worker Error Event]`, 'error');
          logError(`Message: ${err.message}`);
          logError(`Filename: ${err.filename}`);
          logError(`Lineno: ${err.lineno}`);
          logError(`Colno: ${err.colno}`);
          statusEl.textContent = 'Stockfish Worker failed!';
          statusEl.className = 'error';
        };

        log('Sending "uci"...', 'info');
        worker.postMessage('uci');
        log('Sending "isready"...', 'info');
        worker.postMessage('isready');
      } catch (err) {
        log(`Worker instantiation failed: ${err.message}`, 'error');
        logError(err.stack || err.message);
      }
    }
  </script>
</body>
</html>
